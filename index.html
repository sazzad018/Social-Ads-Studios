<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atelier - Creative Studio</title>
    <script>
      // Fix for protobufjs trying to redefine window.fetch
      (function() {
        var originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Something tried to set window.fetch to:', v);
              },
              configurable: true
            });
          } catch (e) {
            console.warn('Could not fix window.fetch', e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
